<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="Consolas, monospace" font-size="13">
  <rect width="900" height="650" fill="#1e1e2e" rx="10"/>

  <text x="450" y="32" text-anchor="middle" fill="#cdd6f4" font-size="20" font-weight="bold">PantryLight — Wiring Diagram</text>

  <!-- ARDUINO UNO -->
  <rect x="200" y="60" width="280" height="180" rx="8" fill="#2a2a3e" stroke="#89b4fa" stroke-width="2"/>
  <text x="340" y="85" text-anchor="middle" fill="#89b4fa" font-size="16" font-weight="bold">Arduino Uno</text>

  <!-- Power section -->
  <rect x="215" y="95" width="60" height="25" rx="4" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="245" y="112" text-anchor="middle" fill="#a6e3a1">5V</text>
  <rect x="215" y="125" width="60" height="25" rx="4" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="245" y="142" text-anchor="middle" fill="#f38ba8">GND</text>

  <!-- Digital pins -->
  <text x="350" y="112" fill="#fab387" font-size="12">D2  (Trig)</text>
  <text x="350" y="132" fill="#fab387" font-size="12">D4  (Echo)</text>
  <text x="350" y="152" fill="#fab387" font-size="12">D11 (LED 1)</text>
  <text x="350" y="172" fill="#fab387" font-size="12">D12 (LED 2)</text>

  <!-- Pin dots -->
  <circle cx="215" cy="107" r="4" fill="#a6e3a1"/>
  <circle cx="215" cy="137" r="4" fill="#f38ba8"/>
  <circle cx="340" cy="107" r="4" fill="#fab387"/>
  <circle cx="340" cy="127" r="4" fill="#fab387"/>
  <circle cx="340" cy="147" r="4" fill="#fab387"/>
  <circle cx="340" cy="167" r="4" fill="#fab387"/>

  <!-- HC-SR04 -->
  <rect x="50" y="310" width="180" height="120" rx="8" fill="#2a2a3e" stroke="#89b4fa" stroke-width="2"/>
  <text x="140" y="338" text-anchor="middle" fill="#89b4fa" font-size="14" font-weight="bold">HC-SR04</text>
  <text x="140" y="358" text-anchor="middle" fill="#cdd6f4" font-size="12">Ultrasonic Sensor</text>
  <line x1="95" y1="370" x2="185" y2="370" stroke="#585b70" stroke-width="1"/>
  <text x="80" y="392" fill="#a6e3a1">VCC  ──  5V</text>
  <text x="80" y="410" fill="#f38ba8">GND  ──  GND</text>
  <text x="80" y="416" fill="#fab387">Trig ──  D2</text>
  <text x="80" y="422" fill="#fab387">Echo ──  D4</text>

  <!-- Connections from HC-SR04 to Arduino -->
  <line x1="215" y1="107" x2="230" y2="392" stroke="#a6e3a1" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="215" y1="137" x2="230" y2="410" stroke="#f38ba8" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="340" y1="107" x2="230" y2="416" stroke="#fab387" stroke-width="2"/>
  <line x1="340" y1="127" x2="230" y2="422" stroke="#fab387" stroke-width="2"/>

  <!-- LED Strip 1 -->
  <rect x="420" y="310" width="180" height="120" rx="8" fill="#2a2a3e" stroke="#a6e3a1" stroke-width="2"/>
  <text x="510" y="338" text-anchor="middle" fill="#a6e3a1" font-size="14" font-weight="bold">LED Strip 1</text>
  <text x="510" y="358" text-anchor="middle" fill="#cdd6f4" font-size="12">WS2818B — 60 LEDs</text>
  <line x1="465" y1="370" x2="555" y2="370" stroke="#585b70" stroke-width="1"/>
  <text x="445" y="392" fill="#a6e3a1">5V       ──  5V PSU</text>
  <text x="445" y="410" fill="#f38ba8">GND      ──  GND (common)</text>
  <text x="445" y="416" fill="#fab387">Data In  ──  D11</text>
  <text x="445" y="422" fill="#cdd6f4">  ↑</text>

  <!-- LED Strip 2 -->
  <rect x="650" y="310" width="180" height="120" rx="8" fill="#2a2a3e" stroke="#f9e2af" stroke-width="2"/>
  <text x="740" y="338" text-anchor="middle" fill="#f9e2af" font-size="14" font-weight="bold">LED Strip 2</text>
  <text x="740" y="358" text-anchor="middle" fill="#cdd6f4" font-size="12">WS2818B — 60 LEDs</text>
  <line x1="695" y1="370" x2="785" y2="370" stroke="#585b70" stroke-width="1"/>
  <text x="675" y="392" fill="#a6e3a1">5V       ──  5V PSU</text>
  <text x="675" y="410" fill="#f38ba8">GND      ──  GND (common)</text>
  <text x="675" y="416" fill="#fab387">Data In  ──  D12</text>
  <text x="675" y="422" fill="#cdd6f4">  ↑</text>

  <!-- Connections from Arduino to LED strips -->
  <line x1="340" y1="147" x2="510" y2="416" stroke="#fab387" stroke-width="2"/>
  <line x1="340" y1="167" x2="740" y2="416" stroke="#fab387" stroke-width="2"/>

  <!-- Power Supply -->
  <rect x="300" y="490" width="250" height="80" rx="8" fill="#2a2a3e" stroke="#f9e2af" stroke-width="2"/>
  <text x="425" y="520" text-anchor="middle" fill="#f9e2af" font-size="14" font-weight="bold">5V Power Supply (5A+)</text>
  <text x="425" y="545" text-anchor="middle" fill="#cdd6f4" font-size="12">Powers LED strips + Arduino via 5V rail</text>
  <text x="425" y="562" text-anchor="middle" fill="#f38ba8">Common ground between all devices</text>

  <!-- Power lines -->
  <line x1="425" y1="490" x2="425" y2="470" stroke="#a6e3a1" stroke-width="2"/>
  <line x1="425" y1="470" x2="245" y2="470" stroke="#a6e3a1" stroke-width="2"/>
  <line x1="245" y1="470" x2="245" y2="120" stroke="#a6e3a1" stroke-width="2"/>

  <line x1="425" y1="490" x2="510" y2="440" stroke="#a6e3a1" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="425" y1="490" x2="740" y2="440" stroke="#a6e3a1" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Legend -->
  <rect x="50" y="480" width="130" height="100" rx="6" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="115" y="500" text-anchor="middle" fill="#cdd6f4" font-size="12" font-weight="bold">Legend</text>
  <line x1="60" y1="518" x2="100" y2="518" stroke="#a6e3a1" stroke-width="2"/>
  <text x="108" y="522" fill="#a6e3a1" font-size="11">Power (5V)</text>
  <line x1="60" y1="538" x2="100" y2="538" stroke="#f38ba8" stroke-width="2"/>
  <text x="108" y="542" fill="#f38ba8" font-size="11">Ground (GND)</text>
  <line x1="60" y1="558" x2="100" y2="558" stroke="#fab387" stroke-width="2"/>
  <text x="108" y="562" fill="#fab387" font-size="11">Signal</text>
  <line x1="60" y1="578" x2="100" y2="578" stroke="#a6e3a1" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="108" y="582" fill="#a6e3a1" font-size="11">Shared PSU</text>

  <text x="450" y="635" text-anchor="middle" fill="#585b70" font-size="11">Always disconnect power before making or changing connections.</text>
</svg>
